            schema:
              $ref: '#/components/schemas/LoginBody'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'

  /api/auth/select-workspace:
    post:
      summary: Auth Select Workspace
      security:
        - PrismSession: []
      requestBody:
        required: true
