openapi: 3.1.0
info:
  title: PRISM FastAPI
  description: FastAPI backend for PRISM approvals platform.
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Next.js dev server with rewrites to FastAPI
  - url: http://127.0.0.1:8000
    description: FastAPI dev server

components:
  securitySchemes:
    PrismSession:
      type: apiKey
      in: cookie
      name: prism_session
  schemas:
    GenericObject:
      type: object
      additionalProperties: true
    LoginBody:
      type: object
      required: [email]
      properties:
        email:
          type: string
    WorkspaceSelectBody:
      type: object
      required: [role]
      properties:
        role:
          type: string
    ApplicationCreateBody:
      type: object
      required: [opportunityId]
      properties:
        opportunityId:
          type: integer
        studentProfileId:
          type: integer
          nullable: true
        submittedData:
          type: object
          nullable: true
          additionalProperties: true
    DecisionBody:
      type: object
      properties:
        remarks:
          type: string
          nullable: true
        reason:
          type: string
          nullable: true
        reviewerEmail:
          type: string
          nullable: true
        requiredInputs:
          type: object
          nullable: true
          additionalProperties: true
        targetStepOrder:
          type: integer
          nullable: true
    StudentResponseBody:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
    CommentCreateBody:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
        visibility:
          type: string
          default: internal
        authorEmail:
          type: string
          nullable: true
    AdminApplicationPatchBody:
      type: object
      required: [submittedData]
      properties:
        submittedData:
          type: object
          additionalProperties: true
    WorkflowRequiredInput:
      type: object
      required: [label]
      properties:
        id:
          type: string
          nullable: true
        label:
          type: string
        inputType:
          type: string
          enum: [text, number, dropdown, multiselect]
          default: text
        required:
          type: boolean
          default: true
        options:
          type: array
          items:
            type: string
    WorkflowStepPayload:
      type: object
      required: [name, reviewerEmail]
      properties:
        name:
          type: string
        reviewerEmail:
          type: string
        reviewerName:
          type: string
          nullable: true
        visibleFields:
          type: array
          items:
            type: string
        requiredInputs:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowRequiredInput'
        slaHours:
          type: integer
          default: 72
        canViewComments:
          type: boolean
          default: false
    CustomFormFieldPayload:
      type: object
      required: [label]
      properties:
        key:
          type: string
          nullable: true
        label:
          type: string
        description:
          type: string
          nullable: true
        fieldHint:
          type: string
          nullable: true
        inputType:
          type: string
          enum: [text, textarea, single_select, multiselect]
          default: text
        options:
          type: array
          items:
            type: string
    VisibilityRulePayload:
      type: object
      required: [ruleType, ruleValue]
      properties:
        ruleType:
          type: string
          enum: [EMAIL, GROUP_EMAIL]
        ruleValue:
          type: string
    OpportunityCreatePayload:
      type: object
      required: [opportunity, formFields, workflowSteps]
      properties:
        opportunity:
          type: object
          additionalProperties: true
        formFields:
          type: array
          items:
            type: string
        customFields:
          type: array
          items:
            $ref: '#/components/schemas/CustomFormFieldPayload'
        workflowSteps:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowStepPayload'
        generatorVisibilityRules:
          type: array
          items:
            $ref: '#/components/schemas/VisibilityRulePayload'
        useDefaultTemplate:
          type: boolean
          nullable: true
          default: false
    OpportunityPatchBody:
      type: object
      properties:
        title:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        cover_image_url:
          type: string
          nullable: true
        term:
          type: string
          nullable: true
        destination:
          type: string
          nullable: true
        deadline:
          type: string
          nullable: true
        seats:
          type: integer
          nullable: true
        status:
          type: string
          nullable: true
        formFields:
          type: array
          nullable: true
          items:
            type: string
        customFields:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/CustomFormFieldPayload'
        workflowSteps:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/WorkflowStepPayload'
        generatorVisibilityRules:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/VisibilityRulePayload'
        useDefaultTemplate:
          type: boolean
          nullable: true

paths:
  /api/health:
    get:
      summary: Health
      responses:
        '200':
          description: Successful response
          content:
